<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snip — URL Shortener</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f5f0e8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 3rem 1.5rem; }
    .topbar { display: flex; align-items: center; gap: 10px; margin-bottom: 3.5rem; max-width: 580px; width: 100%; margin-left: auto; margin-right: auto; }
    .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: #1a1a1a; }
    .logo-text { font-size: 15px; font-weight: 600; color: #1a1a1a; letter-spacing: -0.3px; }
    .hero { text-align: left; max-width: 580px; width: 100%; margin: 0 auto 2.5rem; }
    .eyebrow { font-size: 12px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #888; margin-bottom: 12px; }
    h1 { font-size: 48px; font-weight: 600; color: #1a1a1a; letter-spacing: -2px; line-height: 1.1; margin-bottom: 12px; }
    .sub { font-size: 15px; color: #888; font-weight: 400; line-height: 1.6; }
    .main-card { background: #fff; border-radius: 20px; padding: 1.75rem; width: 100%; max-width: 580px; margin: 0 auto; border: 1px solid #e8e2d9; }
    .input-row { display: flex; border: 1.5px solid #1a1a1a; border-radius: 12px; overflow: hidden; margin-bottom: 1rem; }
    .url-in { flex: 1; border: none; outline: none; font-family: 'DM Mono', monospace; font-size: 13px; color: #1a1a1a; background: #fff; padding: 13px 16px; }
    .url-in::placeholder { color: #bbb; }
    .btn-shorten { font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 14px; padding: 13px 22px; background: #1a1a1a; color: #fff; border: none; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
    .btn-shorten:hover { background: #333; }
    .btn-shorten:disabled { background: #999; cursor: not-allowed; }
    .err { font-size: 13px; color: #c0392b; background: #fdf0ee; border: 1px solid #f5c6c0; border-radius: 8px; padding: 8px 12px; display: none; margin-bottom: 1rem; }
    .result { display: none; }
    .result-top { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid #f0ebe0; }
    .short-url { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; color: #1a1a1a; flex: 1; word-break: break-all; }
    .btn-copy { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; padding: 7px 16px; background: #f5f0e8; border: 1px solid #ddd8ce; color: #1a1a1a; border-radius: 8px; cursor: pointer; flex-shrink: 0; transition: all 0.15s; }
    .btn-copy:hover { background: #ede8de; }
    .qr-row { display: flex; align-items: center; gap: 16px; padding-top: 14px; }
    .qr-box { background: #f5f0e8; border-radius: 12px; padding: 10px; flex-shrink: 0; }
    .qr-text .title { font-size: 14px; font-weight: 500; color: #1a1a1a; margin-bottom: 3px; }
    .qr-text .hint { font-size: 12px; color: #aaa; line-height: 1.5; }
    .loader { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .stamp { margin-top: 3rem; font-size: 11px; color: #bbb; letter-spacing: 0.05em; text-align: center; }
    @media (max-width: 480px) { h1 { font-size: 36px; } .main-card { padding: 1.25rem; } }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo-dot"></div>
    <div class="logo-text">snip</div>
  </div>

  <div class="hero">
    <div class="eyebrow">URL Shortener</div>
    <h1>Long links,<br>cut short.</h1>
    <p class="sub">Paste any URL. Get a clean link and a QR code — free, no sign up.</p>
  </div>

  <div class="main-card">
    <div class="input-row">
      <input class="url-in" id="urlInput" type="text" placeholder="https://paste-your-long-url-here.com/..." />
      <button class="btn-shorten" id="shortenBtn" onclick="shorten()">Shorten</button>
    </div>

    <div class="err" id="errMsg"></div>

    <div class="result" id="result">
      <div class="result-top">
        <div class="short-url" id="shortUrl"></div>
        <button class="btn-copy" id="copyBtn" onclick="copyUrl()">Copy</button>
      </div>
      <div class="qr-row">
        <div class="qr-box">
          <canvas id="qrCanvas" width="80" height="80"></canvas>
        </div>
        <div class="qr-text">
          <div class="title">QR code ready</div>
          <div class="hint">Scan to open on any device.<br>Right-click the QR to save it.</div>
        </div>
      </div>
    </div>
  </div>

  <div class="stamp">powered by bitly &nbsp;·&nbsp; no tracking &nbsp;·&nbsp; free forever</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const BITLY_TOKEN = 'e68d86fa843b6ffcce43a880e2fe0720020fcf06';
    let lastShort = '';

    async function shorten() {
      const input = document.getElementById('urlInput');
      const url = input.value.trim();
      const err = document.getElementById('errMsg');
      const btn = document.getElementById('shortenBtn');
      const result = document.getElementById('result');

      err.style.display = 'none';
      result.style.display = 'none';

      if (!url) { showErr('Please enter a URL.'); return; }
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        showErr('URL must start with http:// or https://'); return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="loader"></span>Working...';

      try {
        const res = await fetch('https://api-ssl.bitly.com/v4/shorten', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + BITLY_TOKEN,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ long_url: url })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'API error');

        const short = data.link;
        lastShort = short;
        document.getElementById('shortUrl').textContent = short;
        result.style.display = 'block';
        generateQR(short);
        input.value = '';
      } catch(e) {
        showErr('Something went wrong — ' + (e.message || 'check your URL and try again.'));
      }

      btn.disabled = false;
      btn.innerHTML = 'Shorten';
    }

    function showErr(msg) {
      const el = document.getElementById('errMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function copyUrl() {
      if (!lastShort) return;
      navigator.clipboard.writeText(lastShort).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 2000);
      });
    }

    function generateQR(url) {
      const canvas = document.getElementById('qrCanvas');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, 80, 80);
      const tmp = document.createElement('div');
      try {
        const qr = new QRCode(tmp, {
          text: url, width: 80, height: 80,
          colorDark: '#1a1a1a', colorLight: '#f5f0e8',
          correctLevel: QRCode.CorrectLevel.M
        });
        setTimeout(() => {
          const img = tmp.querySelector('img') || tmp.querySelector('canvas');
          if (img) {
            const i = new Image();
            i.onload = () => ctx.drawImage(i, 0, 0, 80, 80);
            i.src = img.src || img.toDataURL();
          }
        }, 120);
      } catch(e) {}
    }

    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') shorten();
    });
  </script>
</body>
</html>
